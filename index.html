<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VIVENDA Satisfaction System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <header>

        <img
            src="assets/logo/logo-vivenda.png"
            class="logo"
            alt="Vivenda">

    </header>

    <section id="votePage">

        <h1>Come giudichi il pasto di oggi?</h1>

        <p class="subtitle">

            Tocca una faccina per esprimere il tuo giudizio.

        </p>

        <div id="emojiContainer">

            <!-- SVG inseriti via JavaScript -->

        </div>

    </section>

    <section
        id="thanksPage"
        class="hidden">

        <div class="check">

            ✓

        </div>

        <h2>Grazie!</h2>

        <p>

            Il tuo feedback è stato registrato.

        </p>

    </section>

</div>

<script src="script.js"></script>

</body>

</html>
